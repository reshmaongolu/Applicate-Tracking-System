{% extends 'base.html' %}

{% block content %}
  <div class="card">
    <h2>Jobs</h2>
    {% if jobs %}
      <table>
        <tr><th>ID</th><th>Title</th><th>Department</th><th>Location</th></tr>
        {% for job in jobs %}
          <tr>
            <td>{{ job.id }}</td>
            <td>{{ job.title }}</td>
            <td>{{ job.department }}</td>
            <td>{{ job.location }}</td>
          </tr>
        {% endfor %}
      </table>
    {% else %}
      <p>No jobs available yet.</p>
    {% endif %}
  </div>
{% endblock %}
